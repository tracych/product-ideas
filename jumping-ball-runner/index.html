<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jumping Ball Runner 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: linear-gradient(160deg, #2b1055, #7597de);
    font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", cursive, sans-serif;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
  }
  #wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px;
  }
  h1 {
    color: #fff;
    font-size: clamp(20px, 4vw, 36px);
    text-shadow: 3px 3px 0 #ff6b9d, 6px 6px 0 rgba(0,0,0,.25);
    letter-spacing: 2px;
  }
  #gameBox {
    position: relative;
    width: min(96vw, 1000px);
    aspect-ratio: 12 / 5;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 18px 50px rgba(0,0,0,.45), 0 0 0 6px rgba(255,255,255,.25);
  }
  canvas { width: 100%; height: 100%; display: block; }
  #hud {
    position: absolute; top: 12px; left: 16px;
    color: #fff; pointer-events: none;
    text-shadow: 2px 2px 0 rgba(0,0,0,.45);
    line-height: 1.25;
  }
  #hud .score { font-size: clamp(18px, 2.8vw, 28px); font-weight: bold; }
  #hud .best { font-size: clamp(13px, 2vw, 18px); color: #ffe44d; font-weight: bold; }
  #hud .score.flash { color: #ffe44d; }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: rgba(20, 10, 50, .55);
    backdrop-filter: blur(3px);
    color: #fff; text-align: center;
    transition: opacity .25s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay .big {
    font-size: clamp(26px, 5vw, 48px);
    text-shadow: 3px 3px 0 #ff6b9d;
    animation: wobble 1.6s ease-in-out infinite;
  }
  .overlay .sub { font-size: clamp(14px, 2.2vw, 20px); opacity: .95; }
  .overlay .stats { font-size: clamp(16px, 2.6vw, 24px); line-height: 1.5; }
  .newRecord {
    color: #ffe44d;
    font-size: clamp(18px, 3vw, 28px);
    animation: pulse .5s ease-in-out infinite alternate;
  }
  button {
    font-family: inherit;
    font-size: clamp(16px, 2.6vw, 24px);
    padding: 12px 34px;
    border: none; border-radius: 999px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(180deg, #ff8a5c, #ff4d79);
    box-shadow: 0 6px 0 #b8175a, 0 10px 18px rgba(0,0,0,.35);
    transition: transform .08s, box-shadow .08s;
  }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8175a, 0 4px 8px rgba(0,0,0,.35); }
  #hint { color: rgba(255,255,255,.85); font-size: clamp(12px, 1.8vw, 15px); text-shadow: 1px 1px 2px rgba(0,0,0,.4); }
  @keyframes wobble {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(2deg) scale(1.05); }
  }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.12); }
  }
</style>
</head>
<body>
<div id="wrap">
  <h1>&#127755; JUMPING BALL RUNNER 3D &#127755;</h1>
  <div id="gameBox">
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="score" id="scoreEl">SCORE 0</div>
      <div class="best" id="bestEl">BEST 0</div>
    </div>
    <div id="startOverlay" class="overlay">
      <div class="big">Ready to bounce?</div>
      <div class="sub">Jump over the grumpy cacti!<br>Press once to jump, twice for a double jump.</div>
      <button id="startBtn">&#9654; PLAY</button>
    </div>
    <div id="gameOverOverlay" class="overlay hidden">
      <div class="big">SPLAT!</div>
      <div id="recordLine" class="newRecord" style="display:none">&#127881; NEW HIGH SCORE! &#127881;</div>
      <div class="stats">
        Score: <span id="finalScore">0</span><br>
        Best: <span id="finalBest">0</span>
      </div>
      <button id="retryBtn">&#8635; RETRY</button>
    </div>
  </div>
  <div id="hint">SPACE / &#8593; / TAP to jump &nbsp;&bull;&nbsp; hold for a higher jump &nbsp;&bull;&nbsp; it only gets faster...</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from "three";

// ---------- Funny sounds (Web Audio, no assets needed) ----------
let audioCtx = null;
function audio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function tone({ type = "sine", from = 440, to = from, dur = 0.15, vol = 0.25, delay = 0, bendType = "exp" }) {
  const ac = audio();
  const t0 = ac.currentTime + delay;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(from, t0);
  if (bendType === "exp") osc.frequency.exponentialRampToValueAtTime(Math.max(to, 1), t0 + dur);
  else osc.frequency.linearRampToValueAtTime(to, t0 + dur);
  gain.gain.setValueAtTime(vol, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain).connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.05);
}
const sfx = {
  jump()      { tone({ type: "square", from: 220, to: 660, dur: 0.18, vol: 0.18 }); },
  doubleJump(){ tone({ type: "square", from: 440, to: 990, dur: 0.15, vol: 0.16 });
                tone({ type: "sine",   from: 660, to: 1320, dur: 0.12, vol: 0.1, delay: 0.03 }); },
  land()      { tone({ type: "triangle", from: 150, to: 60, dur: 0.1, vol: 0.2 }); },
  milestone() { tone({ type: "sine", from: 880,  to: 880,  dur: 0.09, vol: 0.16 });
                tone({ type: "sine", from: 1175, to: 1175, dur: 0.14, vol: 0.16, delay: 0.09 }); },
  gameOver()  { // sad trombone: wah wah wah waaaah
    const notes = [311, 294, 277, 262];
    notes.forEach((f, i) => tone({
      type: "sawtooth", from: f * 1.04, to: f * 0.97,
      dur: i === notes.length - 1 ? 0.7 : 0.28,
      vol: 0.14, delay: i * 0.3, bendType: "linear"
    }));
  },
  highScore() {
    [523, 659, 784, 1047].forEach((f, i) =>
      tone({ type: "triangle", from: f, to: f, dur: 0.18, vol: 0.18, delay: 0.12 * i }));
    tone({ type: "triangle", from: 1047, to: 1047, dur: 0.4, vol: 0.18, delay: 0.55 });
  },
};

// ---------- Helpers ----------
function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function canvasTexture(w, h, draw) {
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  draw(c.getContext("2d"), w, h);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

// ---------- Renderer / scene / camera ----------
const gameBox = document.getElementById("gameBox");
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("game"), antialias: true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = canvasTexture(2, 256, (g) => {
  const grad = g.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, "#3f9bfa");
  grad.addColorStop(0.55, "#9fd8ff");
  grad.addColorStop(1, "#ffe9b8");
  g.fillStyle = grad;
  g.fillRect(0, 0, 2, 256);
});
scene.fog = new THREE.Fog(0xbfe3ff, 55, 110);

const camera = new THREE.PerspectiveCamera(48, 2.4, 0.1, 300);
const CAM_POS = new THREE.Vector3(2.5, 4.6, 14.5);
const CAM_LOOK = new THREE.Vector3(0.5, 3.2, 0);
camera.position.copy(CAM_POS);
camera.lookAt(CAM_LOOK);

function fitRenderer() {
  const r = gameBox.getBoundingClientRect();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(r.width, r.height, false);
  camera.aspect = r.width / r.height;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", fitRenderer);

// ---------- Lights ----------
scene.add(new THREE.HemisphereLight(0xbfe7ff, 0x7a9a4f, 0.9));
const sunLight = new THREE.DirectionalLight(0xfff3d6, 1.6);
sunLight.position.set(18, 28, 14);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -45;
sunLight.shadow.camera.right = 45;
sunLight.shadow.camera.top = 30;
sunLight.shadow.camera.bottom = -20;
sunLight.shadow.camera.far = 90;
scene.add(sunLight);

// ---------- Ground + scrolling track ----------
const grassTex = canvasTexture(256, 256, (g) => {
  g.fillStyle = "#58c472";
  g.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 130; i++) {
    g.fillStyle = Math.random() < 0.5 ? "#4cb364" : "#67d182";
    const x = Math.random() * 256, y = Math.random() * 256;
    g.beginPath();
    g.ellipse(x, y, rand(3, 9), rand(2, 5), 0, 0, Math.PI * 2);
    g.fill();
  }
});
grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
grassTex.repeat.set(18, 6);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(240, 80),
  new THREE.MeshLambertMaterial({ map: grassTex })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

const trackTex = canvasTexture(256, 128, (g) => {
  g.fillStyle = "#e3b06a";
  g.fillRect(0, 0, 256, 128);
  for (let i = 0; i < 50; i++) {
    g.fillStyle = Math.random() < 0.5 ? "rgba(160,100,40,.45)" : "rgba(255,225,170,.55)";
    g.beginPath();
    g.arc(Math.random() * 256, Math.random() * 128, rand(2, 6), 0, Math.PI * 2);
    g.fill();
  }
});
trackTex.wrapS = trackTex.wrapT = THREE.RepeatWrapping;
trackTex.repeat.set(18, 1);

const track = new THREE.Mesh(
  new THREE.PlaneGeometry(240, 5.4),
  new THREE.MeshLambertMaterial({ map: trackTex })
);
track.rotation.x = -Math.PI / 2;
track.position.y = 0.02;
track.receiveShadow = true;
scene.add(track);

// scroll rate: plane is 240 world units wide with 18 texture repeats
const GROUND_UNITS_PER_REPEAT = 240 / 18;

// ---------- Face textures (the cartoon magic) ----------
function drawBallFace(g, mood) {
  g.clearRect(0, 0, 256, 256);
  g.lineCap = "round";
  // eyes
  const eyeY = 100;
  g.fillStyle = "#fff";
  g.beginPath(); g.ellipse(95, eyeY, 30, mood === "blink" ? 5 : 34, 0, 0, Math.PI * 2); g.fill();
  g.beginPath(); g.ellipse(170, eyeY, 26, mood === "blink" ? 4 : 30, 0, 0, Math.PI * 2); g.fill();
  if (mood !== "blink") {
    g.fillStyle = "#222";
    const pd = mood === "terror" ? 8 : 0;
    g.beginPath(); g.arc(103, eyeY + pd, 13, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.arc(177, eyeY + pd, 11, 0, Math.PI * 2); g.fill();
  }
  // mouth
  g.strokeStyle = "#7a1240";
  g.fillStyle = "#7a1240";
  g.lineWidth = 11;
  if (mood === "terror") {
    g.beginPath(); g.arc(135, 180, 22, 0, Math.PI * 2); g.fill();
  } else {
    g.beginPath(); g.arc(130, 150, 42, 0.15 * Math.PI, 0.85 * Math.PI); g.stroke();
  }
  // rosy cheek
  g.fillStyle = "rgba(255,120,160,.65)";
  g.beginPath(); g.ellipse(52, 150, 20, 13, 0, 0, Math.PI * 2); g.fill();
}
const faceNormalTex = canvasTexture(256, 256, (g) => drawBallFace(g, "normal"));
const faceBlinkTex  = canvasTexture(256, 256, (g) => drawBallFace(g, "blink"));
const faceTerrorTex = canvasTexture(256, 256, (g) => drawBallFace(g, "terror"));

const grumpyTex = canvasTexture(256, 256, (g) => {
  g.lineCap = "round";
  g.fillStyle = "#fff";
  g.beginPath(); g.arc(90, 110, 26, 0, Math.PI * 2); g.fill();
  g.beginPath(); g.arc(166, 110, 26, 0, Math.PI * 2); g.fill();
  g.fillStyle = "#222";
  g.beginPath(); g.arc(90, 112, 11, 0, Math.PI * 2); g.fill();
  g.beginPath(); g.arc(166, 112, 11, 0, Math.PI * 2); g.fill();
  g.strokeStyle = "#10401a";
  g.lineWidth = 13;
  g.beginPath(); g.moveTo(56, 62); g.lineTo(112, 84); g.stroke();
  g.beginPath(); g.moveTo(200, 62); g.lineTo(144, 84); g.stroke();
  g.beginPath(); g.arc(128, 205, 34, 1.15 * Math.PI, 1.85 * Math.PI); g.stroke();
});

const rockFaceTex = canvasTexture(256, 256, (g) => {
  g.lineCap = "round";
  g.fillStyle = "#fff";
  g.beginPath(); g.arc(92, 110, 24, 0, Math.PI * 2); g.fill();
  g.beginPath(); g.arc(164, 110, 24, 0, Math.PI * 2); g.fill();
  g.fillStyle = "#222";
  g.beginPath(); g.arc(98, 110, 10, 0, Math.PI * 2); g.fill();
  g.beginPath(); g.arc(158, 110, 10, 0, Math.PI * 2); g.fill();
  g.strokeStyle = "#263238";
  g.lineWidth = 11;
  g.beginPath(); g.moveTo(96, 178); g.lineTo(162, 170); g.stroke();
});

const sunTex = canvasTexture(256, 256, (g) => {
  // rays
  g.strokeStyle = "rgba(255,200,60,.9)";
  g.lineWidth = 12; g.lineCap = "round";
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    g.beginPath();
    g.moveTo(128 + Math.cos(a) * 86, 128 + Math.sin(a) * 86);
    g.lineTo(128 + Math.cos(a) * 116, 128 + Math.sin(a) * 116);
    g.stroke();
  }
  g.fillStyle = "#ffd23f";
  g.beginPath(); g.arc(128, 128, 78, 0, Math.PI * 2); g.fill();
  g.fillStyle = "#e8851c";
  g.beginPath(); g.arc(100, 112, 9, 0, Math.PI * 2); g.fill();
  g.beginPath(); g.arc(156, 112, 9, 0, Math.PI * 2); g.fill();
  g.strokeStyle = "#e8851c"; g.lineWidth = 8;
  g.beginPath(); g.arc(128, 138, 30, 0.2 * Math.PI, 0.8 * Math.PI); g.stroke();
});

function makeFaceSprite(tex, scale) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
  s.scale.set(scale, scale, 1);
  return s;
}

// ---------- The ball ----------
const BALL_R = 1;
const BALL_X = -5;

const ballGroup = new THREE.Group();
const beachballTex = canvasTexture(512, 256, (g) => {
  const colors = ["#ff4d79", "#ffe44d", "#4facfe", "#ffffff", "#66bb6a", "#ff8a5c"];
  const w = 512 / colors.length;
  colors.forEach((c, i) => { g.fillStyle = c; g.fillRect(i * w, 0, w + 1, 256); });
});
const ballBody = new THREE.Mesh(
  new THREE.SphereGeometry(BALL_R, 32, 24),
  new THREE.MeshLambertMaterial({ map: beachballTex })
);
ballBody.castShadow = true;
ballGroup.add(ballBody);

const ballFace = makeFaceSprite(faceNormalTex, 1.5);
ballFace.position.set(0.25, 0.1, BALL_R * 0.92);
ballGroup.add(ballFace);

ballGroup.position.set(BALL_X, BALL_R, 0);
scene.add(ballGroup);

// ---------- Sun ----------
const sun = makeFaceSprite(sunTex, 9);
sun.position.set(26, 20, -45);
scene.add(sun);

// ---------- Scenery (real 3D parallax: distant layers scroll slower) ----------
const sceneryLayers = [];   // { group, items:[mesh], speedScale, span }

function addLayer(speedScale, span, builder, count) {
  const items = [];
  for (let i = 0; i < count; i++) {
    const m = builder();
    m.position.x = rand(-span / 2, span / 2);
    scene.add(m);
    items.push(m);
  }
  sceneryLayers.push({ items, speedScale, span });
}

// far purple mountains
addLayer(0.15, 220, () => {
  const h = rand(10, 20), r = rand(7, 13);
  const m = new THREE.Mesh(
    new THREE.ConeGeometry(r, h, 5),
    new THREE.MeshLambertMaterial({ color: pick([0xa18cd1, 0x8f7bc4, 0x7b68b5]) })
  );
  m.position.set(0, h / 2 - 0.5, rand(-58, -42));
  m.rotation.y = rand(0, Math.PI);
  return m;
}, 12);

// mid green hills (squashed spheres)
addLayer(0.35, 200, () => {
  const r = rand(6, 11);
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(r, 16, 12),
    new THREE.MeshLambertMaterial({ color: pick([0x46b06a, 0x3aa85a, 0x55c075]) })
  );
  m.scale.y = rand(0.35, 0.55);
  m.position.set(0, 0, rand(-34, -22));
  return m;
}, 10);

// drifting puffy clouds
addLayer(0.2, 200, () => {
  const cloud = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, fog: false });
  const n = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const s = new THREE.Mesh(new THREE.SphereGeometry(rand(1.2, 2.4), 12, 10), mat);
    s.position.set(i * rand(1.4, 2.2) - n, rand(-0.4, 0.6), rand(-0.5, 0.5));
    cloud.add(s);
  }
  cloud.position.set(0, rand(11, 19), rand(-40, -25));
  cloud.userData.drift = rand(0.4, 1.2);
  return cloud;
}, 7);

// near flowers & shrubs, full speed — these whoosh by
const flowerColors = [0xff6b9d, 0xffe44d, 0xff8a5c, 0xc77dff, 0xffffff];
addLayer(1.0, 160, () => {
  const g = new THREE.Group();
  if (Math.random() < 0.55) { // flower
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.08, 0.9, 6),
      new THREE.MeshLambertMaterial({ color: 0x2e7d32 })
    );
    stem.position.y = 0.45;
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.28, 10, 8),
      new THREE.MeshLambertMaterial({ color: pick(flowerColors) })
    );
    head.position.y = 1;
    g.add(stem, head);
  } else { // shrub
    const bush = new THREE.Mesh(
      new THREE.SphereGeometry(rand(0.5, 0.9), 10, 8),
      new THREE.MeshLambertMaterial({ color: 0x3f9b3f })
    );
    bush.position.y = 0.4;
    bush.scale.y = 0.7;
    bush.castShadow = true;
    g.add(bush);
  }
  const side = Math.random() < 0.5 ? 1 : -1;
  g.position.z = side * rand(4, 9);
  return g;
}, 16);

// ---------- Obstacles ----------
const cactusMat = new THREE.MeshLambertMaterial({ color: 0x4caf50 });
const cactusDarkMat = new THREE.MeshLambertMaterial({ color: 0x2e7d32 });
const rockMat = new THREE.MeshLambertMaterial({ color: 0x78909c });

function buildCactus(h) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CapsuleGeometry(0.55, h - 1.1, 6, 12), cactusMat);
  trunk.position.y = h / 2;
  trunk.castShadow = true;
  g.add(trunk);
  for (const side of [-1, 1]) {
    const arm = new THREE.Mesh(new THREE.CapsuleGeometry(0.26, 0.7, 5, 8), cactusDarkMat);
    arm.position.set(0, h * (side < 0 ? 0.45 : 0.6), side * 0.75);
    arm.rotation.x = side * 0.9;
    arm.castShadow = true;
    g.add(arm);
  }
  const face = makeFaceSprite(grumpyTex, 1.3);
  face.position.set(-0.62, h - 0.75, 0);
  g.add(face);
  return g;
}

function buildRock() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.95, 14, 12), rockMat);
  body.position.y = 0.85;
  body.scale.y = 0.85;
  body.castShadow = true;
  g.add(body);
  const face = makeFaceSprite(rockFaceTex, 1.25);
  face.position.set(-0.55, 0.95, 0.45);
  g.add(face);
  return g;
}

let obstacles = [];   // { group, halfW, h, type, bob }
const SPAWN_X = 42, DESPAWN_X = -42;

function spawnObstacle() {
  const roll = Math.random();
  let o;
  if (roll < 0.5) {
    const h = rand(1.9, 2.6);
    o = { group: buildCactus(h), halfW: 0.85, h, type: "cactus" };
  } else if (roll < 0.75) {
    const h = rand(2.7, 3.3);
    o = { group: buildCactus(h), halfW: 0.9, h, type: "cactus" };
  } else if (roll < 0.9) {
    const g = new THREE.Group();
    const h = rand(2, 2.5);
    const c1 = buildCactus(h), c2 = buildCactus(h * 0.85);
    c1.position.x = -0.95; c2.position.x = 0.95;
    g.add(c1, c2);
    o = { group: g, halfW: 1.85, h, type: "double" };
  } else {
    o = { group: buildRock(), halfW: 0.85, h: 1.7, type: "rock", bob: rand(0, Math.PI * 2) };
  }
  o.group.position.x = SPAWN_X;
  scene.add(o.group);
  obstacles.push(o);
  const gapTime = rand(0.95, 1.7) * (1 - 0.25 * (speed - BASE_SPEED) / (MAX_SPEED - BASE_SPEED));
  spawnTimer = Math.max(gapTime, 0.78);
}

// ---------- Particles ----------
const PARTICLE_POOL = 70;
const particleColors = [0xff6b9d, 0xffe44d, 0x7dd3fc, 0xffffff, 0xdeb887];
const particles = [];
for (let i = 0; i < PARTICLE_POOL; i++) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(0.16, 6, 5),
    new THREE.MeshBasicMaterial({ color: pick(particleColors), transparent: true, fog: false })
  );
  m.visible = false;
  scene.add(m);
  particles.push({ mesh: m, vx: 0, vy: 0, vz: 0, life: 0, maxLife: 1 });
}
function emit(x, y, z, n, spread, colorSet) {
  let emitted = 0;
  for (const p of particles) {
    if (emitted >= n) break;
    if (p.life < p.maxLife) continue;
    emitted++;
    p.mesh.visible = true;
    p.mesh.material.color.setHex(pick(colorSet));
    p.mesh.position.set(x + rand(-0.3, 0.3), y, z + rand(-0.3, 0.3));
    const a = rand(0, Math.PI * 2);
    p.vx = Math.cos(a) * rand(1, spread);
    p.vz = Math.sin(a) * rand(0.5, spread * 0.5);
    p.vy = rand(1, spread * 1.4);
    p.life = 0;
    p.maxLife = rand(0.4, 0.8);
    const s = rand(0.6, 1.6);
    p.mesh.scale.set(s, s, s);
  }
}
const DUST = [0xdeb887, 0xe3c89a];
const CONFETTI = [0xff6b9d, 0xffe44d, 0x7dd3fc, 0xffffff];

// mark all pool particles as dead initially
for (const p of particles) { p.life = 99; p.maxLife = 1; }

// ---------- Game state ----------
const STATE = { MENU: 0, PLAYING: 1, OVER: 2 };
let state = STATE.MENU;
let score = 0;
let best = +(localStorage.getItem("jbr_highscore_3d") || 0);
let speed = 0;
let elapsed = 0;
let nextMilestone = 100;
let worldX = 0;
let shake = 0;
let spawnTimer = 0;

const BASE_SPEED = 14;
const SPEED_GAIN = 0.33;
const MAX_SPEED = 32;
const GRAVITY = -75;
const JUMP_V = 26;
const DOUBLE_JUMP_V = 22.5;

const ball = { y: BALL_R, vy: 0, onGround: true, jumpsUsed: 0, squash: 1, blinkTimer: 2, blink: 0 };

const scoreEl = document.getElementById("scoreEl");
const bestEl = document.getElementById("bestEl");
bestEl.textContent = "BEST " + best;
let flashTimer = 0;

function reset() {
  score = 0;
  speed = BASE_SPEED;
  elapsed = 0;
  nextMilestone = 100;
  worldX = 0;
  shake = 0;
  spawnTimer = 1.3;
  ball.y = BALL_R; ball.vy = 0;
  ball.onGround = true; ball.jumpsUsed = 0; ball.squash = 1;
  for (const o of obstacles) scene.remove(o.group);
  obstacles = [];
  for (const p of particles) { p.life = 99; p.mesh.visible = false; }
  scoreEl.textContent = "SCORE 0";
}

// ---------- Input ----------
let jumpHeld = false;
function doJump() {
  if (state !== STATE.PLAYING) return;
  if (ball.onGround) {
    ball.vy = JUMP_V;
    ball.onGround = false;
    ball.jumpsUsed = 1;
    ball.squash = 1.32;
    sfx.jump();
    emit(BALL_X, 0.3, 0, 6, 3, DUST);
  } else if (ball.jumpsUsed < 2) {
    ball.vy = DOUBLE_JUMP_V;
    ball.jumpsUsed = 2;
    ball.squash = 1.32;
    sfx.doubleJump();
    emit(BALL_X, ball.y - BALL_R, 0, 9, 4, CONFETTI);
  }
}
window.addEventListener("keydown", (e) => {
  if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") {
    e.preventDefault();
    if (state === STATE.MENU) startGame();
    else if (state === STATE.PLAYING && !jumpHeld) doJump();
    jumpHeld = true;
  }
  if (e.code === "Enter" && state === STATE.OVER) startGame();
});
window.addEventListener("keyup", (e) => {
  if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") {
    jumpHeld = false;
    if (ball.vy > 9) ball.vy = 9; // release early = shorter hop
  }
});
renderer.domElement.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  if (state === STATE.PLAYING) doJump();
});
document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("retryBtn").addEventListener("click", startGame);

function startGame() {
  audio();
  reset();
  state = STATE.PLAYING;
  document.getElementById("startOverlay").classList.add("hidden");
  document.getElementById("gameOverOverlay").classList.add("hidden");
}

function gameOver() {
  state = STATE.OVER;
  shake = 0.6;
  emit(BALL_X, ball.y, 0, 26, 7, CONFETTI);
  const finalScore = Math.floor(score);
  const isRecord = finalScore > best;
  if (isRecord) {
    best = finalScore;
    localStorage.setItem("jbr_highscore_3d", best);
    sfx.highScore();
    setTimeout(() => sfx.gameOver(), 900);
  } else {
    sfx.gameOver();
  }
  document.getElementById("finalScore").textContent = finalScore;
  document.getElementById("finalBest").textContent = best;
  document.getElementById("recordLine").style.display = isRecord ? "block" : "none";
  setTimeout(() => document.getElementById("gameOverOverlay").classList.remove("hidden"), 350);
}

// ---------- Collision ----------
function hitTest(o) {
  const pad = 0.3; // forgiving hitbox
  const dx = Math.abs(o.group.position.x - BALL_X);
  if (dx > o.halfW + BALL_R - pad) return false;
  let h = o.h;
  if (o.type === "rock") h += Math.abs(Math.sin(o.bob)) * 0.5;
  return ball.y - BALL_R < h - pad;
}

// ---------- Update ----------
function update(dt) {
  const moving = state === STATE.PLAYING ? 1 : 0.12;
  worldX += speed * dt * moving;

  // texture scroll = real ground speed
  const texScroll = speed * dt * moving / GROUND_UNITS_PER_REPEAT;
  grassTex.offset.x += texScroll;
  trackTex.offset.x += texScroll;

  // parallax scenery layers
  for (const layer of sceneryLayers) {
    for (const item of layer.items) {
      item.position.x -= speed * layer.speedScale * dt * moving;
      if (item.userData.drift) item.position.x -= item.userData.drift * dt;
      if (item.position.x < -layer.span / 2) {
        item.position.x += layer.span;
        if (item.userData.drift) item.position.y = rand(11, 19);
      }
    }
  }

  // sun rays slowly spin
  sun.material.rotation += dt * 0.15;

  // particles
  for (const p of particles) {
    if (p.life >= p.maxLife) { p.mesh.visible = false; continue; }
    p.life += dt;
    p.vy += GRAVITY * 0.18 * dt;
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y = Math.max(0.05, p.mesh.position.y + p.vy * dt);
    p.mesh.position.z += p.vz * dt;
    p.mesh.material.opacity = 1 - p.life / p.maxLife;
  }

  // blink
  ball.blinkTimer -= dt;
  if (ball.blinkTimer <= 0) { ball.blink = 0.12; ball.blinkTimer = rand(1.5, 4); }
  if (ball.blink > 0) ball.blink -= dt;

  // squash recovery
  ball.squash += (1 - ball.squash) * Math.min(1, dt * 10);
  if (shake > 0) shake = Math.max(0, shake - dt * 1.8);

  // face mood
  ballFace.material.map =
    ball.blink > 0 ? faceBlinkTex :
    ball.vy < -14 && !ball.onGround ? faceTerrorTex : faceNormalTex;

  if (state === STATE.PLAYING) {
    elapsed += dt;
    speed = Math.min(MAX_SPEED, BASE_SPEED + elapsed * SPEED_GAIN);
    score += speed * dt * 1.8;
    scoreEl.textContent = "SCORE " + Math.floor(score);
    bestEl.textContent = "BEST " + Math.max(best, Math.floor(score));

    if (Math.floor(score) >= nextMilestone) {
      sfx.milestone();
      flashTimer = 0.6;
      nextMilestone += 100;
    }
    if (flashTimer > 0) {
      flashTimer -= dt;
      scoreEl.classList.toggle("flash", Math.floor(flashTimer * 10) % 2 === 0);
    } else {
      scoreEl.classList.remove("flash");
    }

    // physics
    const wasAirborne = !ball.onGround;
    ball.vy += GRAVITY * dt;
    ball.y += ball.vy * dt;
    if (ball.y <= BALL_R) {
      ball.y = BALL_R;
      ball.vy = 0;
      ball.onGround = true;
      ball.jumpsUsed = 0;
      if (wasAirborne) {
        ball.squash = 0.62;
        sfx.land();
        emit(BALL_X, 0.25, 0, 5, 3, DUST);
      }
    } else {
      ball.onGround = false;
    }
    if (ball.onGround && Math.random() < dt * 10) emit(BALL_X - 0.8, 0.2, 0, 1, 2, DUST);

    // obstacles
    spawnTimer -= dt;
    if (spawnTimer <= 0) spawnObstacle();
    for (const o of obstacles) {
      o.group.position.x -= speed * dt;
      if (o.type === "rock") {
        o.bob += dt * 6;
        o.group.position.y = Math.abs(Math.sin(o.bob)) * 0.5;
      }
      if (hitTest(o)) { gameOver(); break; }
    }
    obstacles = obstacles.filter(o => {
      if (o.group.position.x < DESPAWN_X) { scene.remove(o.group); return false; }
      return true;
    });
  }

  // apply ball transform
  ballGroup.position.y = ball.y - (1 - ball.squash) * BALL_R * 0.5;
  const sy = ball.squash, sxz = 1 + (1 - ball.squash) * 0.7;
  ballGroup.scale.set(sxz, sy, sxz);
  ballBody.rotation.z -= (speed * moving / BALL_R) * dt;

  // camera shake
  camera.position.set(
    CAM_POS.x + (shake > 0 ? rand(-shake, shake) : 0),
    CAM_POS.y + (shake > 0 ? rand(-shake, shake) : 0),
    CAM_POS.z
  );
  camera.lookAt(CAM_LOOK);
}

// ---------- Main loop ----------
const clock = new THREE.Clock();
function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
}

speed = BASE_SPEED; // idle drift on the menu screen looks alive
fitRenderer();
loop();
</script>
</body>
</html>
